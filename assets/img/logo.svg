<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 520" width="640" height="520">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#2a5c3a"/>
      <stop offset="100%" stop-color="#0d2016"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f6d878"/>
      <stop offset="50%" stop-color="#d9a83c"/>
      <stop offset="100%" stop-color="#f6d878"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff3c4"/>
      <stop offset="100%" stop-color="#e8b93c"/>
    </linearGradient>
  </defs>
  <rect width="640" height="520" fill="url(#bg)" rx="28"/>

  <!-- sun -->
  <g>
    <circle cx="320" cy="150" r="60" fill="url(#sun)"/>
    <g stroke="#f6d878" stroke-width="5" stroke-linecap="round">
      <line x1="320" y1="60" x2="320" y2="30"/>
      <line x1="380" y1="80" x2="402" y2="58"/>
      <line x1="260" y1="80" x2="238" y2="58"/>
      <line x1="400" y1="120" x2="428" y2="112"/>
      <line x1="240" y1="120" x2="212" y2="112"/>
    </g>
  </g>

  <!-- lock towers -->
  <g fill="#123321" stroke="#f6d878" stroke-width="3">
    <rect x="150" y="120" width="60" height="90"/>
    <rect x="430" y="120" width="60" height="90"/>
  </g>
  <g fill="#e8b93c">
    <rect x="165" y="140" width="12" height="16"/>
    <rect x="185" y="140" width="12" height="16"/>
    <rect x="165" y="170" width="12" height="16"/>
    <rect x="185" y="170" width="12" height="16"/>
    <rect x="445" y="140" width="12" height="16"/>
    <rect x="465" y="140" width="12" height="16"/>
    <rect x="445" y="170" width="12" height="16"/>
    <rect x="465" y="170" width="12" height="16"/>
  </g>

  <!-- shot glass -->
  <g transform="translate(70,150)">
    <path d="M0 0 L60 0 L52 90 L8 90 Z" fill="#173d27" stroke="#f5f0e1" stroke-width="4"/>
    <path d="M6 30 L54 30 L52 90 L8 90 Z" fill="#c8912e"/>
  </g>

  <!-- herb sprig -->
  <g transform="translate(500,150) rotate(15)">
    <path d="M0 60 C10 20 20 -10 40 -30" fill="none" stroke="#d9a83c" stroke-width="4"/>
    <ellipse cx="10" cy="30" rx="16" ry="8" fill="#173d27" stroke="#f6d878" stroke-width="2" transform="rotate(30 10 30)"/>
    <ellipse cx="22" cy="5" rx="16" ry="8" fill="#173d27" stroke="#f6d878" stroke-width="2" transform="rotate(20 22 5)"/>
    <ellipse cx="36" cy="-22" rx="16" ry="8" fill="#173d27" stroke="#f6d878" stroke-width="2" transform="rotate(10 36 -22)"/>
  </g>

  <!-- ribbon -->
  <rect x="30" y="215" width="580" height="200" rx="30" fill="#123321" stroke="url(#gold)" stroke-width="5"/>

  <text x="320" y="300" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="58" fill="#f5f0e1" stroke="url(#gold)" stroke-width="1">SCHLEUSENKRÄUTER</text>

  <line x1="70" y1="325" x2="570" y2="325" stroke="url(#gold)" stroke-width="2"/>

  <text x="320" y="365" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="30" fill="#e8b93c">Der Schluck für Schleusenzeit</text>

  <!-- waves -->
  <g transform="translate(0,430)">
    <rect x="30" y="0" width="580" height="70" rx="20" fill="#123321" stroke="url(#gold)" stroke-width="4"/>
    <g fill="none" stroke="#f5f0e1" stroke-width="6" stroke-linecap="round">
      <path d="M60 40 Q90 15 120 40 T180 40 T240 40 T300 40 T360 40 T420 40 T480 40 T540 40"/>
    </g>
    <g fill="none" stroke="#3f7a52" stroke-width="6" stroke-linecap="round">
      <path d="M60 55 Q90 30 120 55 T180 55 T240 55 T300 55 T360 55 T420 55 T480 55 T540 55"/>
    </g>
  </g>
</svg>
